<VirtualHost *:80>
    ServerName mindtracker.local
    DocumentRoot /var/www/html/mindtracker/frontend

    # Configuración para archivos estáticos
    <Directory /var/www/html/mindtracker/frontend>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # Configuración para SPA (Single Page Application)
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /

            # Redirigir todas las peticiones de API al backend Node.js
            RewriteRule ^api/(.*)$ http://localhost:2345/api/$1 [P,L]
            RewriteRule ^auth/(.*)$ http://localhost:2345/auth/$1 [P,L]

            # Servir archivos estáticos si existen
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d

            # Redirigir todo lo demás al frontend
            RewriteRule . /index.html [L]
        </IfModule>
    </Directory>

    # Proxy para el backend Node.js
    ProxyRequests Off
    ProxyPreserveHost On

    # Configuración de headers de seguridad
    Header always set X-Frame-Options "DENY"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set X-Content-Type-Options "nosniff"

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/mindtracker_error.log
    CustomLog ${APACHE_LOG_DIR}/mindtracker_access.log combined
</VirtualHost>

# Configuración SSL (HTTPS) - Opcional pero recomendada para producción
<VirtualHost *:443>
    ServerName mindtracker.local
    DocumentRoot /var/www/html/mindtracker/frontend

    # Certificados SSL (configurar con certificados reales en producción)
    #SSLEngine on
    #SSLCertificateFile /etc/ssl/certs/mindtracker.crt
    #SSLCertificateKeyFile /etc/ssl/private/mindtracker.key

    # Misma configuración que el puerto 80
    <Directory /var/www/html/mindtracker/frontend>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /

            RewriteRule ^api/(.*)$ http://localhost:2345/api/$1 [P,L]
            RewriteRule ^auth/(.*)$ http://localhost:2345/auth/$1 [P,L]

            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
        </IfModule>
    </Directory>

    ProxyRequests Off
    ProxyPreserveHost On

    # Headers de seguridad mejorados para HTTPS
    Header always set X-Frame-Options "DENY"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"

    ErrorLog ${APACHE_LOG_DIR}/mindtracker_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/mindtracker_ssl_access.log combined
</VirtualHost>
