<VirtualHost *:80>
    ServerName mindtracker.local
    DocumentRoot /var/www/html/mindtracker/frontend

    # Proxy para el backend Node.js (debe ir antes del Directory)
    ProxyRequests Off
    ProxyPreserveHost On

    ProxyPass /api http://localhost:2345/api
    ProxyPassReverse /api http://localhost:2345/api

    ProxyPass /auth http://localhost:2345/auth
    ProxyPassReverse /auth http://localhost:2345/auth

    # Configuración para archivos estáticos y SPA
    <Directory /var/www/html/mindtracker/frontend>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /

            # Servir archivos estáticos si existen
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d

            # Redirigir todo lo demás al frontend (React Router)
            RewriteRule . /index.html [L]
        </IfModule>
    </Directory>

    # Configuración de headers de seguridad
    Header always set X-Frame-Options "DENY"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set X-Content-Type-Options "nosniff"

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/mindtracker_error.log
    CustomLog ${APACHE_LOG_DIR}/mindtracker_access.log combined
</VirtualHost>

# Configuración SSL (HTTPS) - Opcional pero recomendada para producción
<VirtualHost *:443>
    ServerName mindtracker.local
    DocumentRoot /var/www/html/mindtracker/frontend

    # Certificados SSL (configurar con certificados reales en producción)
    #SSLEngine on
    #SSLCertificateFile /etc/ssl/certs/mindtracker.crt
    #SSLCertificateKeyFile /etc/ssl/private/mindtracker.key

    ProxyRequests Off
    ProxyPreserveHost On

    ProxyPass /api http://localhost:2345/api
    ProxyPassReverse /api http://localhost:2345/api

    ProxyPass /auth http://localhost:2345/auth
    ProxyPassReverse /auth http://localhost:2345/auth

    <Directory /var/www/html/mindtracker/frontend>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /

            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
        </IfModule>
    </Directory>

    # Headers de seguridad mejorados para HTTPS
    Header always set X-Frame-Options "DENY"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"

    ErrorLog ${APACHE_LOG_DIR}/mindtracker_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/mindtracker_ssl_access.log combined
</VirtualHost>
